name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flashcraft
          POSTGRES_USER: flashcraft
          POSTGRES_PASSWORD: flashcraft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flashcraft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: "ci-test-secret-key"
          DEBUG: "True"
          DATABASE_URL: "postgres://flashcraft:flashcraft@localhost:5432/flashcraft"
        run: python manage.py migrate

      - name: Run tests
        env:
          SECRET_KEY: "ci-test-secret-key"
          DEBUG: "True"
          DATABASE_URL: "postgres://flashcraft:flashcraft@localhost:5432/flashcraft"
        run: python manage.py test