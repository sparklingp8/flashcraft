services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flashcraft
      POSTGRES_USER: flashcraft
      POSTGRES_PASSWORD: flashcraft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://flashcraft:flashcraft@db:5432/flashcraft"
      SECRET_KEY: "dev-only-secret-not-for-production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: